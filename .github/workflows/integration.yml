name: Integration

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    - cron: "0 3 * * *"

jobs:
  integration-stable:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: "pnpm"
          cache-dependency-path: mcp-server/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: mcp-server
        run: pnpm install --frozen-lockfile

      - name: Validate plugin metadata
        working-directory: mcp-server
        run: pnpm run validate:plugins
        env:
          STRICT_PLUGIN_META: "true"

      - name: Run stable integration tests
        working-directory: mcp-server
        run: pnpm run test:integration:stable
        env:
          NODE_ENV: test

  integration-full:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: github.event_name == 'schedule'

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: "pnpm"
          cache-dependency-path: mcp-server/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: mcp-server
        run: pnpm install --frozen-lockfile

      - name: Run full integration suite
        working-directory: mcp-server
        run: pnpm run test:integration
        env:
          NODE_ENV: test
          STRICT_PLUGIN_META: "true"
